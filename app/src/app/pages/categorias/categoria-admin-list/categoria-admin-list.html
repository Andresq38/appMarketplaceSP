<section class="admin-header">
    <div><span class="eyebrow">Administración</span><h1>Gestión de Categorías</h1></div>
    <button mat-stroked-button color="primary"><mat-icon>add</mat-icon>Nueva</button>
</section>
<section class="admin-filters">
    <mat-form-field appearance="outline">
        <mat-label>Buscar</mat-label>
        <input matInput [(ngModel)]="search" />
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <div class="estado-filters">
        @for (estado of estados; track estado) {
        <button mat-stroked-button
            [color]="filtroEstado() === estado ? 'primary' : ''"
            (click)="filtroEstado() === estado ? filtroEstado.set(null) : filtroEstado.set(estado)">
            {{ getEstadoLabel(estado) }}
        </button>
        }
    </div>

    <button mat-stroked-button (click)="clearFilters()">Limpiar Filtros</button>
</section>
<p class="summary">{{ totalCategorias() }} categorías</p>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon></div> }
@else {
<div class="table-wrapper">
    <table mat-table [dataSource]="categoriasFiltradas()">
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let c">{{ c.id }}</td>
        </ng-container>
        <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>Categoría</th>
            <td mat-cell *matCellDef="let c"><strong>{{ c.nombre }}</strong></td>
        </ng-container>
        <ng-container matColumnDef="descripcion">
            <th mat-header-cell *matHeaderCellDef>Descripción</th>
            <td mat-cell *matCellDef="let c">{{ c.descripcion }}</td>
        </ng-container>
        <ng-container matColumnDef="estado">
            <th mat-header-cell *matHeaderCellDef>Estado</th>
            <td mat-cell *matCellDef="let c">
                <button mat-stroked-button [color]="c.estado ? 'accent' : 'warn'" (click)="toggleEstado(c)">
                    {{ getEstadoLabel(c.estado) }}
                </button>
            </td>
        </ng-container>
        <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let c">
                <a mat-stroked-button color="primary" [routerLink]="['/categorias', c.id]">Ver</a>
                <button mat-stroked-button color="accent">Editar</button>
                <button mat-stroked-button>Eliminar</button>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</div>
}
