<a mat-stroked-button routerLink="/categorias"><mat-icon>arrow_back</mat-icon>Volver</a>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon></div> }
@else if (categoria()) {
<mat-card>
    <mat-card-header>
        <mat-card-title>{{ categoria()?.nombre }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <p>{{ categoria()?.descripcion }}</p>
    </mat-card-content>
</mat-card>
}
