<h1>Categorías</h1>
<mat-form-field appearance="outline">
    <mat-label>Buscar</mat-label>
    <input matInput [(ngModel)]="search" />
    <mat-icon matSuffix>search</mat-icon>
</mat-form-field>
<button mat-stroked-button (click)="clearFilters()">Limpiar</button>
<p>{{ totalCategorias() }} categorías</p>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon></div> }
@else {
<div class="cards-grid">
    @for (cat of categoriasFiltradas(); track cat.id) {
    <mat-card>
        <mat-card-header>
            <mat-card-title>{{ cat.nombre }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <p>{{ cat.descripcion }}</p>
        </mat-card-content>
        <mat-card-actions>
            <a mat-button [routerLink]="['/categorias', cat.id]">Ver Detalle</a>
        </mat-card-actions>
    </mat-card>
    }
</div>
}
