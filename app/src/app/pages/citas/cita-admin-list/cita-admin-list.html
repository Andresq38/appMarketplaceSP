<section class="admin-header">
    <div><span class="eyebrow">Administración</span><h1>Gestión de Citas</h1></div>
    <button mat-stroked-button color="primary"><mat-icon>add</mat-icon>Nueva</button>
</section>
<section class="admin-filters">
    <mat-form-field appearance="outline">
        <mat-label>Buscar</mat-label>
        <input matInput [(ngModel)]="search" />
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-stroked-button (click)="clearSearch()">Limpiar</button>
</section>
<p class="summary">{{ totalCitas() }} citas</p>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon></div> }
@else {
<div class="table-wrapper">
    <table mat-table [dataSource]="citasFiltradas()">
        <ng-container matColumnDef="profesional">
            <th mat-header-cell *matHeaderCellDef>Profesional</th>
            <td mat-cell *matCellDef="let c">{{ c.profesionalId }}</td>
        </ng-container>
        <ng-container matColumnDef="cliente">
            <th mat-header-cell *matHeaderCellDef>Cliente</th>
            <td mat-cell *matCellDef="let c">{{ c.clienteId }}</td>
        </ng-container>
        <ng-container matColumnDef="fecha">
            <th mat-header-cell *matHeaderCellDef>Fecha</th>
            <td mat-cell *matCellDef="let c">{{ c.fechaCita | date }}</td>
        </ng-container>
        <ng-container matColumnDef="estado">
            <th mat-header-cell *matHeaderCellDef>Estado</th>
            <td mat-cell *matCellDef="let c">{{ c.estado }}</td>
        </ng-container>
        <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let c">
                <a mat-stroked-button color="primary" [routerLink]="['/citas', c.id]">Ver</a>
                <button mat-stroked-button color="accent">Editar</button>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</div>
}
