<section class="page-container">
  <header class="page-header">
    <h1>Actualizar Cita</h1>
    <p>Modifique los datos registrados de la cita.</p>
  </header>

  @if (loading()) {
    <div class="loading-state">
      <mat-spinner></mat-spinner>
      <p>Cargando información de la cita...</p>
    </div>
  } @else {
    @if (error()) {
      <p class="error-message">
        {{ error() }}
      </p>
    }

    @if (cita()) {
      <app-cita-form
        [cita]="cita()"
        [usuarios]="usuarios()"
        [perfiles]="perfiles()"
        [servicios]="servicios()"
        [saving]="saving()"
        (guardar)="guardar($event)"
        (cancelar)="cancelar()"
      ></app-cita-form>
    }
  }
</section>
