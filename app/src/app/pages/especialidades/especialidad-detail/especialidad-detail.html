<a mat-stroked-button [routerLink]="backLink()"><mat-icon>arrow_back</mat-icon>Volver</a>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon><p>{{ error() }}</p></div> }
@else if (especialidad()) {
<mat-card>
    <mat-card-header>
        <mat-card-title>{{ especialidad()?.nombre }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <p>{{ especialidad()?.descripcion }}</p>
    </mat-card-content>
</mat-card>
}
