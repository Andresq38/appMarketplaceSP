<h1>Especialidades</h1>
<mat-form-field appearance="outline">
    <mat-label>Buscar</mat-label>
    <input matInput [(ngModel)]="search" />
    <mat-icon matSuffix>search</mat-icon>
</mat-form-field>
<button mat-stroked-button (click)="clearFilters()">Limpiar</button>
<p>{{ totalEspecialidades() }} especialidades encontradas</p>

@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon><p>{{ error() }}</p></div> }
@else {
<div class="cards-grid">
    @for (esp of especialidadesFiltradas(); track esp.id) {
    <mat-card>
        <mat-card-header>
            <mat-card-title>{{ esp.nombre }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <p>{{ esp.descripcion }}</p>
        </mat-card-content>
        <mat-card-actions>
            <a mat-button [routerLink]="['/especialidades', esp.id]">Ver Detalle</a>
        </mat-card-actions>
    </mat-card>
    }
</div>
}
