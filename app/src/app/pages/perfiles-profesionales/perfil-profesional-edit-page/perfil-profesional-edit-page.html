<section class="page-container">
  <header class="page-header">
    <h1>Actualizar Perfil Profesional</h1>
    <p>Modifique los datos registrados del perfil profesional.</p>
  </header>

  @if (loading()) {
    <div class="loading-state">
      <mat-spinner></mat-spinner>
      <p>Cargando información del perfil profesional...</p>
    </div>
  } @else {
    @if (error()) {
      <p class="error-message">
        {{ error() }}
      </p>
    }

    @if (perfil()) {
      <app-perfil-profesional-form
        [perfil]="perfil()"
        [especialidades]="especialidades()"
        [usuarios]="[]"
        [saving]="saving()"
        (guardar)="guardar($event)"
        (cancelar)="cancelar()"
      ></app-perfil-profesional-form>
    }
  }
</section>
