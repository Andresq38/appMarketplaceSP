<section class="admin-header">
    <div><span class="eyebrow">Administración</span><h1>Gestión de Reseñas</h1></div>
</section>
<section class="admin-filters">
    <mat-form-field appearance="outline">
        <mat-label>Buscar</mat-label>
        <input matInput [(ngModel)]="search" />
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-stroked-button (click)="clearSearch()">Limpiar</button>
</section>
<p class="summary">{{ totalResenas() }} reseñas</p>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon></div> }
@else {
<div class="table-wrapper">
    <table mat-table [dataSource]="resenasFiltradas()">
        <ng-container matColumnDef="profesional">
            <th mat-header-cell *matHeaderCellDef>Profesional</th>
            <td mat-cell *matCellDef="let r">{{ r.perfilProfesionalId }}</td>
        </ng-container>
        <ng-container matColumnDef="calificacion">
            <th mat-header-cell *matHeaderCellDef>Calificación</th>
            <td mat-cell *matCellDef="let r">{{ r.calificacion }}/5 ⭐</td>
        </ng-container>
        <ng-container matColumnDef="comentario">
            <th mat-header-cell *matHeaderCellDef>Comentario</th>
            <td mat-cell *matCellDef="let r">{{ r.comentario }}</td>
        </ng-container>
        <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let r">
                <a mat-stroked-button color="primary" [routerLink]="['/resenas', r.id]" [queryParams]="{ from: 'admin' }">Ver</a>
                <button mat-stroked-button color="primary">Eliminar</button>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</div>
}
