<a mat-stroked-button [routerLink]="backLink()"><mat-icon>arrow_back</mat-icon>Volver</a>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon></div> }
@else if (resena()) {
<mat-card>
    <mat-card-header>
        <mat-card-title>Reseña - {{ resena()?.profesionalId }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <p><strong>Calificación:</strong> {{ resena()?.calificacion }}/5 ⭐</p>
        <p>{{ resena()?.comentario }}</p>
    </mat-card-content>
</mat-card>
}
