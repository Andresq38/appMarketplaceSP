<section class="admin-header">
    <div><span class="eyebrow">Administración</span><h1>Gestión de Servicios</h1></div>
    <button mat-stroked-button color="primary"><mat-icon>add</mat-icon>Nuevo Servicio</button>
</section>
<section class="admin-filters">
    <mat-form-field appearance="outline">
        <mat-label>Buscar</mat-label>
        <input matInput [(ngModel)]="search" />
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-stroked-button (click)="clearSearch()">Limpiar</button>
</section>
<p class="summary">{{ totalServicios() }} servicios encontrados</p>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon><p>{{ error() }}</p></div> }
@else {
<div class="table-wrapper">
    <table mat-table [dataSource]="serviciosFiltrados()" class="admin-table">
        <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>Servicio</th>
            <td mat-cell *matCellDef="let s"><strong>{{ s.nombre }}</strong></td>
        </ng-container>
        <ng-container matColumnDef="precio">
            <th mat-header-cell *matHeaderCellDef>Precio</th>
            <td mat-cell *matCellDef="let s">₡{{ s.precio }}</td>
        </ng-container>
        <ng-container matColumnDef="duracion">
            <th mat-header-cell *matHeaderCellDef>Duración</th>
            <td mat-cell *matCellDef="let s">{{ s.duracionMinutos }} min</td>
        </ng-container>
        <ng-container matColumnDef="modalidad">
            <th mat-header-cell *matHeaderCellDef>Modalidad</th>
            <td mat-cell *matCellDef="let s">{{ s.modalidad }}</td>
        </ng-container>
        <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let s">
                <a mat-stroked-button color="primary" [routerLink]="['/servicios', s.id]">Ver</a>
                <button mat-stroked-button color="accent">Editar</button>
                <button mat-stroked-button color="primary">Eliminar</button>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</div>
}
