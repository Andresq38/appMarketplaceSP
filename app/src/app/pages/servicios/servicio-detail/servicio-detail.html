<a mat-stroked-button routerLink="/servicios"><mat-icon>arrow_back</mat-icon>Volver</a>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon><p>{{ error() }}</p></div> }
@else if (servicio()) {
<mat-card>
    <mat-card-header>
        <mat-card-title>{{ servicio()?.nombre }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <p>{{ servicio()?.descripcion }}</p>
        <mat-divider></mat-divider>
        <div class="info">
            <span><strong>Precio:</strong> ₡{{ servicio()?.precio }}</span>
            <span><strong>Duración:</strong> {{ servicio()?.duracionMinutos }} min</span>
            <span><strong>Modalidad:</strong> {{ servicio()?.modalidad }}</span>
        </div>
    </mat-card-content>
</mat-card>
}
