<section class="admin-header">
    <div><span class="eyebrow">Administración</span><h1>Gestión de Usuarios</h1></div>
    <button mat-stroked-button color="primary"><mat-icon>add</mat-icon>Nuevo Usuario</button>
</section>
<section class="admin-filters">
    <mat-form-field appearance="outline">
        <mat-label>Buscar</mat-label>
        <input matInput [(ngModel)]="search" />
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-stroked-button (click)="clearSearch()">Limpiar</button>
</section>
<p class="summary">{{ totalUsuarios() }} usuarios</p>
@if (loading()) { <div class="state"><mat-spinner diameter="42" /></div> }
@else if (error()) { <div class="state error"><mat-icon>error</mat-icon></div> }
@else {
<div class="table-wrapper">
    <table mat-table [dataSource]="usuariosFiltrados()">
        <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let u"><strong>{{ u.nombre }}</strong></td>
        </ng-container>
        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let u">{{ u.email }}</td>
        </ng-container>
        <ng-container matColumnDef="rol">
            <th mat-header-cell *matHeaderCellDef>Rol</th>
            <td mat-cell *matCellDef="let u">{{ u.rol }}</td>
        </ng-container>
        <ng-container matColumnDef="telefono">
            <th mat-header-cell *matHeaderCellDef>Teléfono</th>
            <td mat-cell *matCellDef="let u">{{ u.telefono }}</td>
        </ng-container>
        <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let u">
                <a mat-stroked-button color="primary" [routerLink]="['/usuarios', u.id]">Ver</a>
                <button mat-stroked-button color="accent">Editar</button>
                <button mat-stroked-button color="primary">Eliminar</button>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</div>
}
